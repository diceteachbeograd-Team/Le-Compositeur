name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: windows-x86_64
            os: windows-latest
          - name: macos-arm64
            os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build GUI binary
        run: cargo build --release -p wc-gui

      - name: Build Linux bundles (.tar.gz + .deb + .rpm)
        if: matrix.name == 'linux-x86_64'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm

          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" == *-* ]]; then
            BASE="${TAG%-*}"
            IDX="${TAG##*-}"
          else
            BASE="$TAG"
            IDX="1"
          fi

          mkdir -p dist/le-compositeur-linux-x86_64-bundle/bin
          cp target/release/wc-gui dist/le-compositeur-linux-x86_64-bundle/bin/le-compositeur
          chmod +x dist/le-compositeur-linux-x86_64-bundle/bin/le-compositeur
          cp README.md LICENSE dist/le-compositeur-linux-x86_64-bundle/
          cp target/release/wc-gui dist/le-compositeur-linux-x86_64
          chmod +x dist/le-compositeur-linux-x86_64
          tar -C dist -czf dist/le-compositeur-linux-x86_64.tar.gz le-compositeur-linux-x86_64-bundle

          mkdir -p dist/linux-root/usr/bin
          mkdir -p dist/linux-root/usr/share/applications
          mkdir -p dist/linux-root/usr/share/icons/hicolor/512x512/apps
          mkdir -p dist/linux-root/usr/share/doc/le-compositeur
          cp target/release/wc-gui dist/linux-root/usr/bin/le-compositeur
          chmod +x dist/linux-root/usr/bin/le-compositeur
          cp assets/icons/le-compositeur.png dist/linux-root/usr/share/icons/hicolor/512x512/apps/le-compositeur.png
          cp README.md dist/linux-root/usr/share/doc/le-compositeur/README.md
          cat > dist/linux-root/usr/share/applications/le-compositeur.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Le Compositeur
          Comment=Dynamic desktop compositor with quotes, weather and news widgets
          Exec=le-compositeur
          Icon=le-compositeur
          Terminal=false
          Categories=Graphics;Utility;
          Keywords=wallpaper;desktop;widgets;quotes;clock;
          EOF

          fpm -s dir -t deb \
            -n le-compositeur \
            -v "${BASE}" \
            --iteration "${IDX}" \
            --architecture amd64 \
            --license "GPL-3.0-or-later" \
            --description "Le Compositeur desktop GUI" \
            --url "https://github.com/${GITHUB_REPOSITORY}" \
            -C dist/linux-root \
            usr

          fpm -s dir -t rpm \
            -n le-compositeur \
            -v "${BASE}" \
            --iteration "${IDX}" \
            --architecture x86_64 \
            --license "GPL-3.0-or-later" \
            --description "Le Compositeur desktop GUI" \
            --url "https://github.com/${GITHUB_REPOSITORY}" \
            -C dist/linux-root \
            usr

          cp dist/*.deb dist/le-compositeur-linux-x86_64.deb
          cp dist/*.rpm dist/le-compositeur-linux-x86_64.rpm

      - name: Build Windows bundles (.zip + .exe)
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/le-compositeur-windows-x86_64/bin | Out-Null
          Copy-Item target/release/wc-gui.exe dist/le-compositeur-windows-x86_64/bin/LeCompositeur.exe
          Copy-Item README.md, LICENSE dist/le-compositeur-windows-x86_64/
          Copy-Item dist/le-compositeur-windows-x86_64/bin/LeCompositeur.exe dist/LeCompositeur-windows-x86_64.exe
          Compress-Archive -Path dist/le-compositeur-windows-x86_64 -DestinationPath dist/le-compositeur-windows-x86_64.zip -Force

      - name: Build macOS ARM bundle (.dmg)
        if: matrix.name == 'macos-arm64'
        run: |
          set -euo pipefail
          APP_ROOT="dist/Le Compositeur.app/Contents"
          mkdir -p "${APP_ROOT}/MacOS"
          cp target/release/wc-gui "${APP_ROOT}/MacOS/Le Compositeur"
          chmod +x "${APP_ROOT}/MacOS/Le Compositeur"
          cat > "${APP_ROOT}/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleName</key>
              <string>Le Compositeur</string>
              <key>CFBundleDisplayName</key>
              <string>Le Compositeur</string>
              <key>CFBundleIdentifier</key>
              <string>com.diceteachbeograd.lecompositeur</string>
              <key>CFBundleExecutable</key>
              <string>Le Compositeur</string>
              <key>CFBundleVersion</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>NSHumanReadableCopyright</key>
              <string>diceteachbeograd-Team</string>
            </dict>
          </plist>
          PLIST
          hdiutil create -volname "Le Compositeur" -srcfolder "dist/Le Compositeur.app" -ov -format UDZO "dist/le-compositeur-macos-arm64.dmg"

      - name: Upload Linux release files
        if: matrix.name == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x86_64
          path: |
            dist/le-compositeur-linux-x86_64
            dist/le-compositeur-linux-x86_64.tar.gz
            dist/le-compositeur-linux-x86_64.deb
            dist/le-compositeur-linux-x86_64.rpm

      - name: Upload Windows release files
        if: matrix.name == 'windows-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64
          path: |
            dist/le-compositeur-windows-x86_64.zip
            dist/LeCompositeur-windows-x86_64.exe

      - name: Upload macOS release files
        if: matrix.name == 'macos-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            dist/le-compositeur-macos-arm64.dmg

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > RELEASE_BODY.md <<'EOF'
          ## Le Compositeur Release

          Direct downloads:
          - Latest releases page: https://github.com/diceteachbeograd-Team/Le-Compositeur/releases/latest
          - This tag: https://github.com/diceteachbeograd-Team/Le-Compositeur/releases/tag/${{ github.ref_name }}

          Included artifacts:
          - Linux: `le-compositeur-linux-x86_64.tar.gz`, `le-compositeur-linux-x86_64.deb`, `le-compositeur-linux-x86_64.rpm`, `le-compositeur-linux-x86_64`
          - Windows: `le-compositeur-windows-x86_64.zip`, `LeCompositeur-windows-x86_64.exe`
          - macOS ARM: `le-compositeur-macos-arm64.dmg`

          Notes:
          - End-user application name: **Le Compositeur**
          - Project attribution: **diceteachbeograd-Team**
          EOF

      - name: Publish release once (no duplicated notes)
        uses: softprops/action-gh-release@v2
        with:
          name: Le Compositeur ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-pre') }}
          files: release-assets/*
