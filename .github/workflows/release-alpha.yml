name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive_ext: tar.gz
          - name: windows-x86_64
            os: windows-latest
            archive_ext: zip
          - name: macos-x86_64
            os: macos-13
            archive_ext: tar.gz
          - name: macos-arm64
            os: macos-14
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binaries
        run: cargo build --release -p wc-cli -p wc-gui

      - name: Prepare bundle (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/wallpaper-composer-${{ matrix.name }}/bin
          cp target/release/wc-cli dist/wallpaper-composer-${{ matrix.name }}/bin/
          cp target/release/wc-gui dist/wallpaper-composer-${{ matrix.name }}/bin/
          cp README.md LICENSE dist/wallpaper-composer-${{ matrix.name }}/
          cp target/release/wc-cli dist/wc-cli-${{ matrix.name }}
          cp target/release/wc-gui dist/wc-gui-${{ matrix.name }}
          tar -C dist -czf dist/wallpaper-composer-${{ matrix.name }}.tar.gz wallpaper-composer-${{ matrix.name }}

      - name: Prepare bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/wallpaper-composer-${{ matrix.name }}/bin | Out-Null
          Copy-Item target/release/wc-cli.exe dist/wallpaper-composer-${{ matrix.name }}/bin/
          Copy-Item target/release/wc-gui.exe dist/wallpaper-composer-${{ matrix.name }}/bin/
          Copy-Item README.md, LICENSE dist/wallpaper-composer-${{ matrix.name }}/
          Copy-Item target/release/wc-cli.exe dist/wc-cli-${{ matrix.name }}.exe
          Copy-Item target/release/wc-gui.exe dist/wc-gui-${{ matrix.name }}.exe
          Compress-Archive -Path dist/wallpaper-composer-${{ matrix.name }} -DestinationPath dist/wallpaper-composer-${{ matrix.name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wallpaper-composer-${{ matrix.name }}
          path: |
            dist/wallpaper-composer-${{ matrix.name }}.${{ matrix.archive_ext }}
            dist/wc-cli-${{ matrix.name }}*
            dist/wc-gui-${{ matrix.name }}*

      - name: Publish on GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Wallpaper Composer ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-pre') }}
          files: |
            dist/wallpaper-composer-${{ matrix.name }}.${{ matrix.archive_ext }}
            dist/wc-cli-${{ matrix.name }}*
            dist/wc-gui-${{ matrix.name }}*
